<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[COMPANY_NAME] | Contact Us</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            
            /* Social Colors */
            --telegram-color: #0088cc;
            --instagram-color: #e1306c;
            --tiktok-color: #ff0050;
            
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- CONTAINER & CARD --- */
        .container {
            width: 100%;
            max-width: 480px;
            animation: fadeIn 0.8s ease-out;
        }

        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: var(--transition-smooth);
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(99, 102, 241, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* --- HEADER ELEMENTS --- */
        .logo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 24px auto;
            position: relative;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            padding: 5px;
            background: rgba(15, 23, 42, 0.6);
            transition: var(--transition-smooth);
        }

        .profile-card:hover .logo {
            transform: scale(1.05);
            border-color: #818cf8;
        }

        .company-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .company-tagline {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* --- PHONE CALL BUTTONS --- */
        .phone-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 36px;
        }

        .call-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
            position: relative;
            overflow: hidden;
        }

        .call-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: 0.5s;
        }

        .call-btn:hover::before {
            left: 100%;
        }

        .call-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .call-btn i {
            font-size: 1.1rem;
            transition: var(--transition-smooth);
        }

        .call-btn:hover i {
            transform: rotate(15deg) scale(1.1);
        }

        /* --- SOCIAL MEDIA BUTTONS --- */
        .social-section {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            font-size: 1.4rem;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        /* Dynamic social hover effects */
        .social-icon.telegram:hover {
            background: var(--telegram-color);
            border-color: var(--telegram-color);
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.4);
            color: #fff;
            transform: translateY(-4px) scale(1.05);
        }

        .social-icon.instagram:hover {
            background: var(--instagram-color);
            border-color: var(--instagram-color);
            box-shadow: 0 0 20px rgba(225, 48, 108, 0.4);
            color: #fff;
            transform: translateY(-4px) scale(1.05);
        }

        .social-icon.tiktok:hover {
            background: var(--tiktok-color);
            border-color: var(--tiktok-color);
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
            color: #fff;
            transform: translateY(-4px) scale(1.05);
        }

        /* --- ANIMATIONS --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 400px) {
            .profile-card {
                padding: 30px 20px;
            }
            
            .company-name {
                font-size: 1.5rem;
            }

            .call-btn {
                padding: 14px 20px;
                font-size: 0.95rem;
            }

            .social-icon {
                width: 48px;
                height: 48px;
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <main class="profile-card">
            
            <div class="logo-container">
                <img src="1.png" alt="[COMPANY_NAME] Logo" class="logo" onerror="this.src='https://via.placeholder.com/150/6366f1/ffffff?text=LOGO'">
            </div>
            
            <h1 class="company-name">HORIZON ENGINEERING</h1>
            <p class="company-tagline">نڤیسینگەها هورایزن بۆ هەمی کارێن ئەندازیاری وەک دیزانکرن و جێبەجێکرنا هەمی کارێن ئەندازیاری</p>

            <section class="phone-section">
                <a href="tel:[07508969614]" class="call-btn" aria-label="Call Phone Number 1">
                    <i class="fa-solid fa-phone"></i>
                    <span>مەسعود</span>
                </a>
                <a href="tel:[07503444525]" class="call-btn" aria-label="Call Phone Number 2">
                    <i class="fa-solid fa-phone"></i>
                    <span>سلام</span>
                </a>
            </section>

            <section class="social-section">
                
                <a href="https://www.instagram.com/aqarat.harem?igsh=dzFxYTVyaXRvNHRt" target="_blank" rel="noopener noreferrer" class="social-icon instagram" aria-label="Visit our Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://maps.app.goo.gl/2WvM5dqRaX6eJ4ws5?g_st=ic" target="_blank" rel="noopener noreferrer" class="social-icon google-maps" aria-label="Find us on Google Maps">
    <i class="fa-solid fa-map-location-dot"></i>
</a>
            </section>

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const callButtons = document.querySelectorAll('.call-btn');
            const socialLinks = document.querySelectorAll('.social-icon');

            // Optional: Log interactions / Analytics hook placeholder
            callButtons.forEach(button => {
                button.addEventListener('click', (e) => {
                    const phoneNumber = button.querySelector('span').innerText;
                    console.log(`Initiating call sequence to: ${phoneNumber}`);
                });
            });

            socialLinks.forEach(link => {
                link.addEventListener('click', () => {
                    const dynamicPlatform = link.classList[1];
                    console.log(`Navigating to official ${dynamicPlatform} profile.`);
                });
            });
        });
    </script>
</body>
</html>
